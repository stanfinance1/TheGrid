<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GRID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='2' y='2' width='12' height='12' fill='none' stroke='%2300DFFC' stroke-width='2'/><line x1='8' y1='2' x2='8' y2='14' stroke='%2300DFFC' stroke-width='1'/><line x1='2' y1='8' x2='14' y2='8' stroke='%2300DFFC' stroke-width='1'/></svg>">
</head>
<body>
    <!-- Login Gate -->
    <div id="login-screen">
        <div id="login-center">
            <div id="login-prompt"></div>
            <input type="password" id="login-input" autocomplete="off" spellcheck="false">
            <div id="login-error"></div>
            <div id="boot-sequence"></div>
        </div>
        <div id="login-flash"></div>
    </div>

    <div id="app" style="display:none">
        <!-- Header -->
        <header id="header">
            <h1>THE GRID</h1>
            <div id="header-right">
                <div id="time-bar">
                    <span class="time-zone"><span class="tz-label tz-nyc">NYC</span> <span id="tz-nyc">--:--:--</span></span>
                    <span class="time-zone"><span class="tz-label tz-ca">CA</span> <span id="tz-ca">--:--:--</span></span>
                </div>
                <span id="header-stats"></span>
                <button id="music-toggle" class="music-btn" title="Toggle music">
                    <svg id="music-icon-on" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                    </svg>
                    <svg id="music-icon-off" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                        <line x1="1" y1="1" x2="23" y2="23" stroke-width="2.5"/>
                    </svg>
                </button>
                <span id="conn-status" class="conn-connecting">CONNECTING</span>
            </div>
        </header>

        <!-- Control Center - Left Sidebar -->
        <div id="control-center">
            <h2>CONTROL CENTER</h2>
            <div id="agent-status-list"></div>
            <div id="cc-footer">
                <div id="cc-footer-text">-- / 6 ONLINE</div>
            </div>
            <div id="scoreboard">
                <h2>SCOREBOARD</h2>
                <div id="scoreboard-stats">
                    <div class="work-empty">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Main canvas area -->
        <div id="main">
            <div id="canvas-wrap">
                <canvas id="town-canvas"></canvas>
            </div>
            <div id="work-panel">
                <h2>WORK QUEUE</h2>
                <div id="work-list">
                    <div class="work-empty">Connecting...</div>
                </div>
            </div>
            <div id="todo-panel">
                <div id="todo-header">
                    <h2>MY TASKS</h2>
                </div>
                <div id="todo-add">
                    <input type="text" id="todo-input" placeholder="ADD TASK..." maxlength="80">
                    <div id="todo-urgency-btns">
                        <button class="urgency-btn urgency-low active" data-urgency="low">LO</button>
                        <button class="urgency-btn urgency-med" data-urgency="med">MED</button>
                        <button class="urgency-btn urgency-high" data-urgency="high">HI</button>
                    </div>
                    <button id="todo-btn-add">+ADD</button>
                </div>
                <div id="todo-list"></div>
            </div>
        </div>

        <!-- Sidebar - Event Log + Acquisition + Recurring Tasks -->
        <div id="sidebar">
            <!-- Event Log (top) -->
            <div id="event-log-section">
                <div id="sidebar-header">
                    <h2>EVENT LOG</h2>
                    <button id="btn-clear-log" title="Clear log">CLR</button>
                </div>
                <div id="event-list"></div>
            </div>

            <!-- Acquisition Dashboard (middle) -->
            <div id="acquisition-section">
                <div class="sidebar-section-header">
                    <h2>ACQUISITION</h2>
                    <span id="acq-status" class="acq-status-dot"></span>
                </div>
                <div id="acquisition-data">
                    <div class="work-empty">Loading...</div>
                </div>
            </div>

            <!-- Recurring Tasks -->
            <div id="cron-section">
                <div class="sidebar-section-header">
                    <h2>RECURRING TASKS</h2>
                </div>
                <div id="cron-list">
                    <div class="work-empty">Loading...</div>
                </div>
            </div>

            <!-- Overseer Audit Log (bottom) -->
            <div id="overseer-log-section">
                <div class="sidebar-section-header">
                    <h2>OVERSEER LOG</h2>
                    <span id="overseer-log-count" class="log-count-badge">0</span>
                </div>
                <div id="overseer-log-list">
                    <div class="work-empty">No changes yet</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts (order matters: sprites -> renderer -> app) -->
    <script src="/static/sprites.js"></script>
    <script src="/static/renderer.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
